name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths: [apps/web/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node and compile JSX
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && node compile.js

      - name: Inject Supabase config and access control
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ALLOWED_EMAIL: ${{ secrets.ALLOWED_EMAIL }}
        run: |
          sed -i "s|%%SUPABASE_URL%%|${SUPABASE_URL}|g" apps/web/index.html
          sed -i "s|%%SUPABASE_ANON_KEY%%|${SUPABASE_ANON_KEY}|g" apps/web/index.html
          sed -i "s|%%ALLOWED_EMAIL%%|${ALLOWED_EMAIL}|g" apps/web/index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
